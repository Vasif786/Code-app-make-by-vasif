name: Build Unsigned IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: macos-14

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Xcode Version
        run: xcodebuild -version

      - name: Download Frameworks

        run: |

          chmod +x downloadFrameworks.sh
          ./downloadFrameworks.sh

      - name: Build Archive

        run: |

          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)

          echo "PROJECT=$PROJECT"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "Code App" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/CodeApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Create IPA

        run: |

          mkdir Payload

          cp -R build/CodeApp.xcarchive/Products/Applications/*.app Payload/

          cd Payload

          zip -r ../CodeApp.ipa .

          cd ..

          ls -lh CodeApp.ipa

      - name: Upload IPA Release

        uses: softprops/action-gh-release@v2

        with:

          tag_name: build-${{ github.run_number }}

          name: Unsigned IPA

          files: |
            CodeApp.ipa

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
